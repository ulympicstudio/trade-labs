[pytest]
addopts = -q
# CI-friendly default: the mocked-IBKR harness under tests/ needs no network,
# broker, or optional deps. Repo-root scripts (test_backtest.py, etc.) require
# optional packages (feedparser, sqlalchemy) and are run explicitly, not by
# bare `pytest`.
testpaths = tests
norecursedirs =
    .venv
    logs
    data
    runs
    src/__pycache__
